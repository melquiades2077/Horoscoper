AllCops:
  TargetRubyVersion: 3.1
  NewCops: enable
  SuggestExtensions: false
  Exclude:
    - 'vendor/**/*'
    - 'data/**/*'
    - 'Gemfile.lock'

require:
  - rubocop-rspec

Layout/EndOfLine:
  Enabled: false

Style/Documentation:
  Enabled: false

Style/FrozenStringLiteralComment:
  Enabled: true

Metrics/MethodLength:
  Max: 20

Metrics/BlockLength:
  Exclude:
    - 'spec/**/*'
    - '*.gemspec'
    - 'Rakefile'

Metrics/ClassLength:
  Max: 150

Metrics/AbcSize:
  Max: 30

Metrics/ParameterLists:
  Max: 6

Layout/LineLength:
  Max: 120

RSpec/ExampleLength:
  Max: 15

RSpec/MultipleExpectations:
  Max: 6

RSpec/NestedGroups:
  Max: 4

RSpec/MultipleMemoizedHelpers:
  Max: 12

RSpec/IdenticalEqualityAssertion:
  Enabled: false

RSpec/ExpectActual:
  Enabled: false

Lint/ScriptPermission:
  Enabled: false

Layout/EmptyLines:
  Enabled: false